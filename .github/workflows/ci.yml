name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/language.json
          test -f dist/locales/manifest.json
          test -f dist/locales/en_us.json
          ls -la dist/assets/
