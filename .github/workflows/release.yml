name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

      - name: Match package.json version to tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NO_V="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_NO_V" ]; then
            echo "::error::Tag ${TAG} must match package.json version (${PKG_VERSION}). Bump version then tag v${PKG_VERSION}."
            exit 1
          fi
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package site artifact
        run: node scripts/package-release.mjs

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          TAR="release/quest-book-site-v${VERSION}.tar.gz"
          ZIP="release/quest-book-site-v${VERSION}.zip"
          gh release create "$TAG" "$TAR" "$ZIP" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes
